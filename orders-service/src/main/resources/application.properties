spring.application.name=orders-service
server.port=8084

#Postgres DB Connection
spring.datasource.url=jdbc:postgresql://localhost:5434/orders_db
spring.datasource.username=admin
spring.datasource.password=password
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.datasource.driver-class-name=org.postgresql.Driver


#Kafka Consumer
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=orderEvent:com.marcuswhocodes.kafka.event.OrderEvent

#kafka -producer
spring.kafka.template.default-topic=payment-requests
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer



#Base URLs for other services
cart.service.url=http://localhost:8081/api/v1/cart
user.service.base-url=http://localhost:8080/api/v1/user
product.service.base-url=http://localhost:8082/api/v1/products
services.payment-service.base-url=http://localhost:8085/api/v1/payment